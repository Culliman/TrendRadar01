# ═══════════════════════════════════════════════════════════════
#                    TrendRadar 配置文件
#                      Version: 2.2.0
# ═══════════════════════════════════════════════════════════════


# 可视化配置编辑器地址: https://sansan0.github.io/TrendRadar/


# ===============================================================
# 1. 基础设置
# ===============================================================
app:
  timezone: "Asia/Shanghai"
  show_version_update: false


# ===============================================================
# 1.5 调度系统
# ===============================================================
schedule:
  enabled: false
  preset: "morning_evening"


# ===============================================================
# 2. 数据源 - 只保留政务/权威新闻源，剔除娱乐热搜
# ===============================================================
platforms:
  enabled: true
  sources:
    - id: "baidu"
      name: "百度热搜"
    - id: "thepaper"
      name: "澎湃新闻"
    - id: "ifeng"
      name: "凤凰网"
    - id: "cls-hot"
      name: "财联社热门"


# ===============================================================
# 3. RSS 全部关闭，不需要杂资讯
# ===============================================================
rss:
  enabled: false
  freshness_filter:
    enabled: true
    max_age_days: 1
  feeds: []


# ===============================================================
# 4. 报告模式：增量推送，无重复
# ===============================================================
report:
  mode: "incremental"
  display_mode: "keyword"
  sort_by_position_first: true
  rank_threshold: 5
  max_news_per_keyword: 6


# ===============================================================
# 4.5 筛选策略：关键词优先 + AI精准复核
# ===============================================================
filter:
  method: "keyword"
  priority_sort_enabled: true


# ===============================================================
# 4.6 AI 智能筛选配置
# ===============================================================
ai_filter:
  batch_size: 200
  batch_interval: 2
  min_score: 0.65
  reclassify_threshold: 0.6


# ===============================================================
# 5. 推送内容控制（精简界面）
# ===============================================================
display:
  region_order:
    - hotlist
    - ai_analysis
  regions:
    hotlist: true
    new_items: false
    rss: false
    standalone: false
    ai_analysis: true
  standalone:
    platforms: []
    rss_feeds: []
    max_items: 20


# ===============================================================
# 6. 推送通知（钉钉留空，走GitHub Secrets）
# ===============================================================
notification:
  enabled: true
  channels:
    feishu:
      webhook_url: ""
    dingtalk:
      webhook_url: ""
    wework:
      webhook_url: ""
      msg_type: "markdown"
    telegram:
      bot_token: ""
      chat_id: ""
    email:
      from: ""
      password: ""
      to: ""
      smtp_server: ""
      smtp_port: ""
    ntfy:
      server_url: "https://ntfy.sh"
      topic: ""
      token: ""
    bark:
      url: ""
    slack:
      webhook_url: ""
    generic_webhook:
      webhook_url: ""
      payload_template: ""


# ===============================================================
# 7. 存储配置
# ===============================================================
storage:
  backend: "auto"
  formats:
    sqlite: true
    txt: false
    html: true
  local:
    data_dir: "output"
    retention_days: 7
  remote:
    retention_days: 0
    endpoint_url: ""
    bucket_name: ""
    access_key_id: ""
    secret_access_key: ""
    region: ""
  pull:
    enabled: false
    days: 7


# ===============================================================
# 8. AI 模型配置 【已填好你的通义千问 qwen-max】
# ===============================================================
ai:
  model: ""
  api_key: ""
  api_base: ""
  timeout: 120
  temperature: 0.8
  max_tokens: 5000
  num_retries: 1
  fallback_models: []


# ===============================================================
# 9. AI 分析功能（开启，精准分拣检察+AI资讯）
# ===============================================================
ai_analysis:
  enabled: false
  language: "Chinese"
  prompt_file: "ai_analysis_prompt.txt"
  mode: "follow_report"
  max_news_for_analysis: 120
  include_rss: false
  include_standalone: false
  include_rank_timeline: false


# ===============================================================
# 10. AI 翻译关闭，无需翻译
# ===============================================================
ai_translation:
  enabled: false
  language: "中文"
  prompt_file: "ai_translation_prompt.txt"
  scope:
    hotlist: false
    rss: false
    standalone: false


# ===============================================================
# 11. 高级设置
# ===============================================================
advanced:
  debug: false
  version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version"
  mcp_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_mcp"
  configs_version_check_url: "https://raw.githubusercontent.com/sansan0/TrendRadar/refs/heads/master/version_configs"
  crawler:
    request_interval: 2000
    use_proxy: false
    default_proxy: "http://127.0.0.1:10801"
  rss:
    request_interval: 1000
    timeout: 15
    use_proxy: false
    proxy_url: ""
  weight:
    rank: 0.6
    frequency: 0.3
    hotness: 0.1
  max_accounts_per_channel: 3
  batch_size:
    default: 4000
    dingtalk: 20000
    feishu: 30000
    bark: 4000
    slack: 4000
  batch_send_interval: 3
  feishu_message_separator: "━━━━━━━━━━━━━━━━"
